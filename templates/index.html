<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
        }

        header {
            background-color: lightgray;
            text-align: left;
            padding: 20px;
        }

        nav {
            display: flex; 
            justify-content: left;
        }

        nav a {
            padding: 15px 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }


    </style>
</head>
<body>
    <header>
        <h1>Cabeçalho</h1>
        <nav>
            <a href="about">Sobre</a>
            <a href="contact">Contato</a>
        </nav>
