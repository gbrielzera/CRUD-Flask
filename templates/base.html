<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Meu Site{% endblock %}</title>
    <link rel="stylesheet" href="{{  url_for('static', filename='style.css')  }}"
</head>
<body>

    <nav>
        <a href="/">Home</a> |
        <a href="/formulario">Formulário</a> |
        <a href="/about">Sobre</a>
    </nav>

    <hr>
    
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
                {% for msg in messages %}
                    <li>{{ msg }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}   

    {% block content %}
    {% endblock %}

</body>
</html>
